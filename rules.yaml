# =========================================================================
# Таксономия модерации карточек продуктов — v1.0
# =========================================================================
# 35 текстовых правил + 30 правил для фото.
# severity: low | medium | high | critical
# =========================================================================

version: 1
last_updated: '2026-04-23'
severity_scale:
  low: Низкая
  medium: Средняя
  high: Высокая
  critical: Критическая

text_rules:
- id: TXT-01
  category: Достоверность
  title: Недостоверное название активности
  description: |-
    Название вводит пользователя в заблуждение относительно формата, места, состава услуги или сути активности.
  example: 'Поездка в Грузию на 5 дней' при фактически однодневной экскурсии
  severity: high
- id: TXT-02
  category: Достоверность
  title: Недостоверное описание программы
  description: |-
    В описании указаны условия, услуги, точки маршрута или программа, которые не подтверждены организатором или противоречат фактическим параметрам активности.
  example: Указано питание и трансфер, которых нет
  severity: high
- id: TXT-03
  category: Достоверность
  title: Ложные обещания
  description: |-
    Текст содержит обещания, которые не закреплены условиями активности, правилами сервиса или подтвержденной операционной логикой.
  example: 'Гарантирован возврат в любой момент'
  severity: medium
- id: TXT-04
  category: Достоверность
  title: Подмена сути активности
  description: |-
    Описание смещает акцент на второстепенные преимущества и скрывает ключевые ограничения, риски или особенности участия.
  example: Акцент только на бонусах без указания сложного подъема
  severity: medium
- id: TXT-05
  category: Юридические риски
  title: Запрещенные или незаконные предложения
  description: |-
    Текст продвигает услуги, практики или действия, которые нарушают применимое законодательство или правила платформы.
  example: Предложение купить алкоголь в составе тура для несовершеннолетних
  severity: critical
- id: TXT-06
  category: Юридические риски
  title: Призыв обходить правила платформы
  description: |-
    Описание побуждает оплатить, забронировать или договориться вне платформы либо обойти установленные правила продажи.
  example: 'Пишите в мессенджер, сделаем дешевле без комиссии'
  severity: high
- id: TXT-07
  category: Персональные данные
  title: Публикация персональных данных
  description: |-
    Текст активности содержит телефоны, email, ссылки на личные профили, документы, адреса проживания или иные персональные данные.
  example: Личный номер гида в описании программы
  severity: critical
- id: TXT-08
  category: Персональные данные
  title: Публикация данных третьих лиц без необходимости
  description: |-
    В тексте раскрываются данные сотрудников, водителей, экскурсоводов, партнеров или посетителей без оправданной необходимости для карточки активности.
  example: ФИО и личный телефон водителя
  severity: critical
- id: TXT-09
  category: Персональные данные
  title: Публикация чувствительной информации
  description: |-
    Текст содержит сведения о здоровье, возрасте детей, инвалидности, семейных обстоятельствах или иных чувствительных данных.
  example: Описание конкретного кейса ребенка с диагнозом
  severity: critical
- id: TXT-10
  category: Нормы общения
  title: Оскорбительные формулировки
  description: |-
    Текст активности содержит уничижительные, грубые или пренебрежительные формулировки по отношению к посетителю или группам людей.
  example: 'Для нытиков эта поездка не подойдет'
  severity: high
- id: TXT-11
  category: Нормы общения
  title: Дискриминационные высказывания
  description: |-
    Описание содержит ограничения или негативные оценки по полу, национальности, возрасту, религии и другим личным признакам, не основанные на законных требованиях.
  example: 'Только для нормальных семей без...'
  severity: critical
- id: TXT-12
  category: Нормы общения
  title: Нецензурная лексика
  description: |-
    В тексте используется мат, обсценная лексика или ее завуалированные формы.
  example: Мат или грубые слова через символы
  severity: high
- id: TXT-13
  category: Нормы общения
  title: Агрессивный или провокационный тон
  description: |-
    Описание или правила участия написаны в конфликтной, давящей или унижающей манере.
  example: 'Кто не успел — сам виноват, претензии не принимаем'
  severity: medium
- id: TXT-14
  category: Неприемлемый контент
  title: Экстремизм, ненависть, оправдание насилия
  description: |-
    Текст содержит язык ненависти, призывы к насилию, экстремистские тезисы или оправдание причинения вреда.
  example: Призыв к расправе над группой лиц
  severity: critical
- id: TXT-15
  category: Неприемлемый контент
  title: Опасные советы или инструкции
  description: |-
    Описание побуждает к опасным действиям, нарушению техники безопасности или причинению вреда.
  example: Советы игнорировать страховку на маршруте
  severity: critical
- id: TXT-16
  category: Неприемлемый контент
  title: Контент для взрослых
  description: |-
    Текст содержит сексуально откровенные или непристойные описания, неуместные для карточки активности.
  example: Подробные эротизированные описания
  severity: critical
- id: TXT-17
  category: Неприемлемый контент
  title: Пропаганда запрещенных веществ
  description: |-
    Описание оправдывает, романтизирует или продвигает употребление наркотиков и иных запрещенных веществ.
  example: 'У нас можно расслабиться с любыми веществами'
  severity: critical
- id: TXT-18
  category: Реклама и спам
  title: Рекламный спам в описании
  description: |-
    Текст превращен в продающий блок без описания сути активности, содержит повторяющиеся рекламные лозунги или чрезмерную саморекламу.
  example: Многократные повторы 'только сейчас, лучший тур'
  severity: medium
- id: TXT-19
  category: Реклама и спам
  title: Сторонние ссылки и контакты
  description: |-
    В тексте размещены ссылки на внешние сайты, соцсети, мессенджеры или контакты для переноса общения вне платформы.
  example: Ссылка на Telegram-канал организатора
  severity: medium
- id: TXT-20
  category: Реклама и спам
  title: Призывы оформить заказ вне платформы
  description: |-
    Текст стимулирует бронирование, оплату или согласование условий вне Localtrip.
  example: 'Бронируйте напрямую по номеру'
  severity: high
- id: TXT-21
  category: Логика платформы
  title: Несоответствие типу активности
  description: |-
    Текст описывает другой продукт, чем выбранный тип сущности: событие, экскурсия или тур.
  example: В карточке экскурсии размещено описание многодневного пакетного тура
  severity: high
- id: TXT-22
  category: Логика платформы
  title: Несоответствие параметрам карточки
  description: |-
    Описание противоречит заданным в карточке датам, возрастному цензу, длительности, месту, составу услуги или способу участия.
  example: В тексте возраст 6+, в настройках карточки 12+
  severity: high
- id: TXT-23
  category: Логика платформы
  title: Использование карточки не по назначению
  description: |-
    Карточка используется для публикации объявления, вакансии, сбора заявок, аренды, рекламы партнера или иной сущности вне логики каталога активностей.
  example: 'Ищем гидов на сезон' в карточке активности
  severity: high
- id: TXT-24
  category: Структура и качество текста
  title: Пустой или бессодержательный текст
  description: |-
    Описание отсутствует либо не дает пользователю понимания сути активности.
  example: 'Скоро будет'
  severity: low
- id: TXT-25
  category: Структура и качество текста
  title: Шаблонный текст без конкретики
  description: |-
    Использован универсальный маркетинговый шаблон, не отражающий особенности конкретной активности.
  example: 'Это незабываемое путешествие для всех' без деталей
  severity: low
- id: TXT-26
  category: Структура и качество текста
  title: Нечитаемый текст или технический мусор
  description: |-
    Текст содержит следы генерации, плейсхолдеры, дубли, обрывки, HTML/Markdown-мусор или случайные символы.
  example: '{{title}} ### lorem ipsum !!!'
  severity: medium
- id: TXT-27
  category: Структура и качество текста
  title: Смысл неясен
  description: |-
    Из-за структуры, ошибок или фрагментарности невозможно понять, что именно предлагается пользователю.
  example: Несвязанные блоки без логики и завершенных мыслей
  severity: medium
- id: TXT-28
  category: Формат
  title: Избыточный капслок и визуальное давление
  description: |-
    Текст оформлен как крик: много заглавных букв, знаков восклицания, повторов символов.
  example: 'САМЫЙ ЛУЧШИЙ ТУР!!! ТОЛЬКО СЕГОДНЯ!!!'
  severity: low
- id: TXT-29
  category: Формат
  title: Избыточные эмодзи или декоративные элементы
  description: |-
    Описание перегружено эмодзи, символами, украшениями и мешает восприятию.
  example: '🔥🔥🔥 МЕГА ТУР ✨✨✨'
  severity: low
- id: TXT-30
  category: Формат
  title: Неподходящий язык публикации
  description: |-
    Текст полностью написан на языке, непонятном основной аудитории карточки и модерации, без необходимости и перевода.
  example: Описание только на иностранном языке
  severity: low
- id: TXT-31
  category: Контент и ожидания
  title: Скрытие обязательных ограничений
  description: |-
    В тексте отсутствуют критичные ограничения, которые влияют на решение о покупке: физическая нагрузка, отсутствие удобств, длительный трансфер, требования к документам.
  example: Не указано, что нужен паспорт для прохода
  severity: high
- id: TXT-32
  category: Контент и ожидания
  title: Манипулятивные формулировки
  description: |-
    Описание давит на чувство вины, страх упустить выгоду или иные эмоции вместо корректного информирования.
  example: 'Кто не купит сейчас, пожалеет всю жизнь'
  severity: low
- id: TXT-33
  category: Контент и ожидания
  title: Неподтвержденные заявления о статусе/качестве
  description: |-
    Используются утверждения 'официальный', 'лучший', 'гарантированный', 'сертифицированный' без подтверждения.
  example: 'Официальный партнер государства' без оснований
  severity: medium
- id: TXT-34
  category: Коммерческая информация
  title: Раскрытие внутренних коммерческих условий
  description: |-
    Описание содержит внутренние ставки, комиссии, партнерские условия, договоренности или служебные правила, не предназначенные для публикации.
  example: Указание агентской комиссии в публичном описании
  severity: high
- id: TXT-35
  category: Модерационные риски
  title: Указание на обход модерации или ограничений
  description: |-
    Текст прямо описывает способы обойти требования платформы, документы, возрастные ограничения или иные проверки.
  example: 'Если возраст не подходит, напишите отдельно — решим'
  severity: high
image_rules:
- id: IMG-01
  category: Качество изображения
  title: Фото низкого качества
  description: |-
    Изображение размытое, темное, пикселизированное, с сильными шумами или не позволяет понять содержание активности.
  example: Сильно размытая обложка
  severity: low
- id: IMG-02
  category: Качество изображения
  title: Нечитаемое или обрезанное фото
  description: |-
    Ключевой объект обрезан, изображение повернуто некорректно или визуально испорчено так, что не подходит для карточки.
  example: Обрезаны лица/объект, перевернутое фото
  severity: low
- id: IMG-03
  category: Соответствие активности
  title: Фото не относится к активности
  description: |-
    Изображение не связано с местом, программой, услугой, локацией или атмосферой конкретной активности.
  example: Стоковое море для городской экскурсии
  severity: medium
- id: IMG-04
  category: Соответствие активности
  title: Вводящее в заблуждение фото
  description: |-
    Фотография создает ложное представление о составе услуги, уровне сервиса, локации или условиях участия.
  example: Показан отель, которого нет в туре
  severity: high
- id: IMG-05
  category: Соответствие активности
  title: Фото другого объекта или бренда
  description: |-
    Использовано фото чужой площадки, чужого тура, чужой экскурсии или иного продукта.
  example: Фото конкурирующего организатора
  severity: high
- id: IMG-06
  category: Персональные данные
  title: Документы, билеты, номера заказов
  description: |-
    На фото видны билеты, посадочные, документы, номера бронирования, QR-коды или иные данные, позволяющие идентифицировать пользователя или заказ.
  example: Фото билета с читаемым QR
  severity: critical
- id: IMG-07
  category: Персональные данные
  title: Контакты и персональные данные
  description: |-
    На изображении видны телефоны, email, адреса, номера авто, профили в соцсетях или иные персональные данные.
  example: Табличка с номером телефона на весь кадр
  severity: critical
- id: IMG-08
  category: Персональные данные
  title: Дети и чувствительные категории без уместности
  description: |-
    На фото акцентно показаны дети, уязвимые лица или чувствительные ситуации без явной необходимости и безопасного контекста.
  example: Крупный план чужого ребенка как обложка
  severity: high
- id: IMG-09
  category: Правообладатели и бренды
  title: Водяные знаки и логотипы сторонних сервисов
  description: |-
    На фото есть заметные водяные знаки фотостоков, логотипы агрегаторов, соцсетей или иных сервисов.
  example: Shutterstock watermark
  severity: medium
- id: IMG-10
  category: Правообладатели и бренды
  title: Чужой рекламный материал
  description: |-
    Изображение является баннером, афишей, листовкой или рекламным макетом стороннего бренда, а не фотографией активности.
  example: Промобаннер партнера вместо фото
  severity: medium
- id: IMG-11
  category: Реклама и спам
  title: Контакты для ухода с платформы
  description: |-
    На фото размещены телефон, Telegram, WhatsApp, сайт, QR-код или иные контакты для перевода коммуникации вне платформы.
  example: Баннер с номером и Telegram
  severity: high
- id: IMG-12
  category: Реклама и спам
  title: Рекламный креатив вместо фото
  description: |-
    Загружен текстовый рекламный баннер, прайс, акция или промопост без визуала самой активности.
  example: Картинка 'скидка 30% только сегодня'
  severity: medium
- id: IMG-13
  category: Формат
  title: Избыточный текст на фото
  description: |-
    Изображение перегружено текстом, что ухудшает восприятие карточки и заменяет фото афишей.
  example: Половина изображения занята текстом программы
  severity: low
- id: IMG-14
  category: Формат
  title: Коллаж или макет плохого качества
  description: |-
    Изображение собрано в коллаж/афишу низкого качества, с мелкими элементами и нечитаемыми деталями.
  example: Много маленьких фото в одном кадре
  severity: low
- id: IMG-15
  category: Формат
  title: Неподходящее соотношение или технический дефект
  description: |-
    Фото с сильными полями, искажением, артефактами, неправильным масштабом или фоном, который ломает отображение карточки.
  example: Узкое вертикальное изображение с полями
  severity: low
- id: IMG-16
  category: Неприемлемый контент
  title: Обнаженность или сексуализированный контент
  description: |-
    На фото есть сексуально откровенные, непристойные или унижающие изображения.
  example: Откровенная поза/обнажение на обложке
  severity: critical
- id: IMG-17
  category: Неприемлемый контент
  title: Шок-контент, кровь, травмы
  description: |-
    Изображение содержит сцены насилия, травм, крови, жестокости или иного травмирующего контента.
  example: Крупный план травмы
  severity: critical
- id: IMG-18
  category: Неприемлемый контент
  title: Опасные действия без контекста безопасности
  description: |-
    Фото демонстрирует действия, которые могут восприниматься как поощрение рискованного поведения без пояснений и мер безопасности.
  example: Человек без страховки на высоте
  severity: high
- id: IMG-19
  category: Неприемлемый контент
  title: Запрещенные вещества или их пропаганда
  description: |-
    На изображении есть наркотики, атрибутика их употребления или визуальная романтизация запрещенных веществ.
  example: Фото с наркотическими веществами
  severity: critical
- id: IMG-20
  category: Неприемлемый контент
  title: Экстремизм, ненависть, запрещенная символика
  description: |-
    Изображение содержит экстремистскую символику, жесты, лозунги или язык ненависти.
  example: Запрещенная символика на баннере
  severity: critical
- id: IMG-21
  category: Алкоголь и курение
  title: Акцентная демонстрация алкоголя
  description: |-
    Алкоголь является центральным элементом изображения и формирует нежелательный акцент карточки активности.
  example: Крупный план бутылок как обложка
  severity: medium
- id: IMG-22
  category: Алкоголь и курение
  title: Курение или вейпы в акценте
  description: |-
    На фото акцентно показан процесс курения, вейпы, кальяны или иная подобная атрибутика.
  example: Человек выпускает дым в кадр
  severity: medium
- id: IMG-23
  category: Достоверность
  title: Избыточная ретушь или генеративная картинка без соответствия
  description: |-
    Изображение слишком искусственное, не отражает реальный объект активности и вводит пользователя в заблуждение.
  example: Нереалистичный AI-рендер места проведения
  severity: medium
- id: IMG-24
  category: Достоверность
  title: Чужие отзывы, рейтинги, обещания на изображении
  description: |-
    На фото размещены рейтинги, гарантии, отзывы или коммерческие утверждения, которые не должны заменять визуал активности.
  example: '5 звезд, 100% восторг' поверх фото
  severity: low
- id: IMG-25
  category: Логика платформы
  title: Фото не отражает маршрут/место/программу
  description: |-
    Галерея не помогает понять, куда поедет пользователь, что увидит или как проходит активность.
  example: Набор абстрактных картинок вместо фото маршрута
  severity: medium
- id: IMG-26
  category: Логика платформы
  title: Дублирующиеся фотографии
  description: |-
    В галерее многократно загружено одно и то же изображение или минимально отличающиеся дубли.
  example: Три одинаковые обложки подряд
  severity: low
- id: IMG-27
  category: Логика платформы
  title: Скриншот интерфейса вместо фото
  description: |-
    Загружен скриншот переписки, карты, сайта, билета или интерфейса, а не фотография активности.
  example: Скриншот чата с клиентом
  severity: medium
- id: IMG-28
  category: Логика платформы
  title: Фото используется не по назначению
  description: |-
    Изображение является прайсом, таблицей, документом, схемой или иным материалом, который должен размещаться не в галерее фото.
  example: Прайс-лист в JPG
  severity: medium
- id: IMG-29
  category: Коммерческая информация
  title: Непубличные условия и внутренняя информация
  description: |-
    На фото показаны договоры, служебные таблицы, комиссии, внутренние инструкции или иные непубличные материалы.
  example: Скриншот агентских условий
  severity: high
- id: IMG-30
  category: Авторские и правовые риски
  title: Нарушение прав на использование изображения
  description: |-
    Изображение выглядит как чужой профессиональный материал без прав, подтверждений или допустимого использования.
  example: Промофото известного отеля из чужого каталога
  severity: high