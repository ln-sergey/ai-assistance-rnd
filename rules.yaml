# =========================================================================
# Таксономия модерации отзывов — v1.1
# =========================================================================
# 35 текстовых правил + 15 правил для фото.
# severity: low | medium | high | critical
# =========================================================================

version: 1
last_updated: '2026-04-22'
severity_scale:
  low: Низкая
  medium: Средняя
  high: Высокая
  critical: Критическая
text_rules:
- id: RVW-TXT-01
  category: Достоверность
  title: Недостоверное содержание отзыва
  description: |-
    Текст содержит сведения, которые противоречат подтверждённым данным платформы, заказа, маршрута, времени, услуге или иным проверяемым фактам.
  example: Заявление об отмене, которой не было
  severity: high
- id: RVW-TXT-02
  category: Достоверность
  title: Введение в заблуждение
  description: |-
    Отзыв или сообщение формирует ложное впечатление о ситуации за счёт искажения обстоятельств, неполного контекста или подмены фактов.
  example: Утверждение о невозврате, если возврат уже проведён
  severity: high
- id: RVW-TXT-03
  category: Достоверность
  title: Неподтверждённые обвинения
  description: |-
    Текст содержит обвинения в адрес организатора, посетителя, платформы, сотрудника или третьих лиц без проверяемых оснований.
  example: Обвинение гида в краже без доказательств
  severity: critical
- id: RVW-TXT-04
  category: Нормы общения
  title: Оскорбления и унижение
  description: Текст содержит оскорбительные, уничижительные или издевательские формулировки в адрес другой стороны.
  example: «Организатор мошенник и хам», «клиент неадекватный»
  severity: high
- id: RVW-TXT-05
  category: Нормы общения
  title: Агрессивный или грубый тон
  description: Текст написан в конфликтном, хамском, раздражённом или провокационном стиле даже без прямых оскорблений.
  example: «Разберитесь сначала сами», «не врите здесь»
  severity: medium
- id: RVW-TXT-06
  category: Нормы общения
  title: Угрозы или давление
  description: Текст содержит угрозы, запугивание, давление, намёки на санкции, жалобы, суд или иные меры воздействия.
  example: «Удалите отзыв, иначе обратимся в суд»
  severity: high
- id: RVW-TXT-07
  category: Нормы общения
  title: Дискриминационные высказывания
  description: Текст содержит дискриминацию, унижение или негативные высказывания по личным признакам.
  example: Высказывания о национальности, возрасте, поле, религии
  severity: critical
- id: RVW-TXT-08
  category: Нормы общения
  title: Нецензурная лексика
  description: Текст содержит мат, обсценную лексику или её завуалированные формы.
  example: Мат или заменённые символами грубые выражения
  severity: high
- id: RVW-TXT-09
  category: Нормы общения
  title: Непристойные или сексуализированные формулировки
  description: Текст содержит непристойные, сексуализированные или унижающие формулировки.
  example: Пошлые намёки в отзыве или ответе
  severity: critical
- id: RVW-TXT-10
  category: Персональные данные
  title: Публикация персональных данных автора или другой стороны
  description: |-
    Текст раскрывает телефон, email, адрес, ссылки на личные профили, мессенджеры или иные персональные данные клиента, организатора, сотрудника или третьих лиц.
  example: Телефон, email, ссылка на соцсеть
  severity: critical
- id: RVW-TXT-11
  category: Персональные данные
  title: Публикация данных заказа или бронирования
  description: |-
    Текст содержит номер заказа, бронирования, билета или иной идентификатор, по которому можно установить личность или детали поездки.
  example: «По заказу LT-458219...»
  severity: high
- id: RVW-TXT-12
  category: Персональные данные
  title: Публикация финансовых данных
  description: Текст раскрывает сведения об оплате, возврате, сумме, реквизитах, транзакции или задолженности.
  example: «Вам вернули 3 450 ₽ на карту ****1234»
  severity: critical
- id: RVW-TXT-13
  category: Персональные данные
  title: Публикация чувствительной информации
  description: |-
    Текст раскрывает сведения о здоровье, инвалидности, семейных обстоятельствах, возрасте ребёнка или других чувствительных данных.
  example: Упоминание диагноза или личных обстоятельств клиента
  severity: critical
- id: RVW-TXT-14
  category: Персональные данные
  title: Публикация личной переписки или обращений в поддержку
  description: Текст содержит цитаты, пересказ или скриншотный пересказ личной переписки, звонков или обращений в поддержку.
  example: Фрагменты из WhatsApp, Telegram, email, чата поддержки
  severity: high
- id: RVW-TXT-15
  category: Персональные данные
  title: Публикация внутренней служебной информации
  description: |-
    Текст раскрывает данные из CRM, внутренние заметки, результаты проверки или иную непубличную информацию сервиса или организатора.
  example: Комментарий менеджера из CRM или внутренний статус кейса
  severity: high
- id: RVW-TXT-16
  category: По существу
  title: Отзыв или сообщение не относится к активности
  description: Текст не связан с конкретной активностью, посещением, услугой или опытом пользователя.
  example: Жалоба на рекламу платформы в отзыве о туре
  severity: medium
- id: RVW-TXT-17
  category: По существу
  title: Пустой или бессодержательный текст
  description: Публикация формально отправлена, но не содержит содержательной мысли, оценки или реакции.
  example: «Ок», «Норм», «Принято»
  severity: low
- id: RVW-TXT-18
  category: По существу
  title: Шаблонный текст без связи с ситуацией
  description: Использован универсальный шаблон, который не учитывает содержание конкретного отзыва или контекст активности.
  example: Одинаковый текст на все отзывы
  severity: low
- id: RVW-TXT-19
  category: По существу
  title: Слишком общий текст
  description: Текст состоит только из общих фраз и не отражает сути впечатления, замечания или ответа.
  example: «Спасибо, мы всегда стараемся» на жалобу о задержке
  severity: low
- id: RVW-TXT-20
  category: По существу
  title: Нечитаемый текст или технический мусор
  description: Текст содержит случайные символы, дубли, обрывки фраз, плейсхолдеры или следы генерации.
  example: «!!! ??? test test {{name}}»
  severity: medium
- id: RVW-TXT-21
  category: Конфликт
  title: Обвинение другой стороны
  description: Текст перекладывает вину на клиента, организатора, сервис или сотрудника в некорректной форме.
  example: «Вы сами виноваты, что опоздали»
  severity: medium
- id: RVW-TXT-22
  category: Конфликт
  title: Публичный спор
  description: Текст построен как спор, опровержение или попытка доказать неправоту другой стороны вместо корректной публикации.
  example: «Всё было не так, как вы пишете»
  severity: medium
- id: RVW-TXT-23
  category: Конфликт
  title: Обесценивание опыта или мнения
  description: Текст ставит под сомнение значимость опыта другой стороны или её права на оценку.
  example: «Это не проблема», «вы преувеличиваете»
  severity: medium
- id: RVW-TXT-24
  category: Конфликт
  title: Переход на личность
  description: Текст комментирует личность, поведение, интеллект или мотивы другой стороны вместо ситуации.
  example: «Вы просто конфликтный человек»
  severity: high
- id: RVW-TXT-25
  category: Конфликт
  title: Давление на изменение или удаление отзыва
  description: Текст содержит просьбу, требование или намёк удалить, изменить или смягчить отзыв.
  example: «Удалите отзыв, и мы решим вопрос»
  severity: high
- id: RVW-TXT-26
  category: Реклама и спам
  title: Рекламный характер текста
  description: Отзыв, ответ или типизированное сообщение используется как реклама услуг, акций, скидок, туров или других предложений.
  example: «У нас сейчас скидка 20% на следующий тур»
  severity: medium
- id: RVW-TXT-27
  category: Реклама и спам
  title: Призывы к покупке или бронированию
  description: Текст содержит призывы купить, оформить, перейти, забронировать или воспользоваться предложением.
  example: «Бронируйте следующий выезд уже сейчас»
  severity: medium
- id: RVW-TXT-28
  category: Реклама и спам
  title: Сторонние ссылки или контакты
  description: |-
    Текст содержит ссылки на внешние сайты, соцсети, мессенджеры, телефон, email или другие контакты для перевода общения вне платформы.
  example: Ссылка на Instagram, Telegram, сайт, номер WhatsApp
  severity: medium
- id: RVW-TXT-29
  category: Юридические риски
  title: Обвинения в нарушении закона без оснований
  description: Текст обвиняет другую сторону в мошенничестве, клевете, шантаже и т.п. без подтверждённых оснований.
  example: «Это вымогательство», «это клевета»
  severity: critical
- id: RVW-TXT-30
  category: Юридические риски
  title: Раскрытие договорной или закрытой информации
  description: Текст раскрывает непубличные условия договора, комиссии, партнёрства, служебных процедур или внутренней модерации.
  example: Внутренние ставки, условия договора, внутренние инструкции поддержки
  severity: high
- id: RVW-TXT-31
  category: Формат
  title: Избыточный капслок, эмодзи или визуальное давление
  description: 'Текст оформлен как крик: много заглавных букв, восклицаний, повторов символов, декоративных вставок.'
  example: «МЫ ВООБЩЕ НЕ ВИНОВАТЫ!!! 🔥🔥🔥»
  severity: low
- id: RVW-TXT-32
  category: Формат
  title: Текст на неподходящем языке
  description: |-
    Отзыв или сообщение написаны на языке, непонятном основной аудитории карточки и мешающем модерации без достаточных оснований.
  example: Текст только на иностранном языке без контекста
  severity: low
- id: RVW-TXT-33
  category: Неприемлемый контент
  title: Экстремизм, ненависть или оправдание насилия
  description: Текст содержит опасные высказывания, язык ненависти или оправдание насилия.
  example: Призывы к расправе, унижение групп
  severity: critical
- id: RVW-TXT-34
  category: Неприемлемый контент
  title: Опасный, шокирующий или взрослый контент
  description: |-
    Текст содержит шок-контент, порнографические, сексуально откровенные материалы, опасные советы или пропаганду запрещённых веществ.
  example: Подробные описания насилия, откровенные сцены, советы по вреду
  severity: critical
- id: RVW-TXT-35
  category: Логика платформы
  title: Недопустимое типизированное сообщение сервиса
  description: |-
    Автоматическое или типизированное сообщение сервиса сформулировано так, что выглядит обвиняющим, вводящим в заблуждение, раскрывает лишние данные или подталкивает к конфликту.
  example: Шаблон сервиса с указанием лишних деталей кейса
  severity: high
image_rules:
- id: RVW-IMG-01
  category: Качество изображения
  title: Фото низкого качества
  description: Изображение размытое, тёмное, пикселизированное, с сильными шумами или не позволяет понять содержание отзыва.
  example: Сильно размытое фото без различимых деталей
  severity: low
- id: RVW-IMG-02
  category: Качество изображения
  title: Нечитаемое или обрезанное фото
  description: Ключевой объект обрезан, изображение повёрнуто некорректно или визуально испорчено так, что не подходит для
    публикации.
  example: Обрезан товар, лицо, билет или место происшествия
  severity: low
- id: RVW-IMG-03
  category: Соответствие отзыву
  title: Фото не относится к отзыву
  description: Изображение не связано с посещением, услугой, маршрутом, местом, организацией или предметом отзыва.
  example: Случайная картинка из галереи вместо фото с активности
  severity: medium
- id: RVW-IMG-04
  category: Соответствие отзыву
  title: Вводящее в заблуждение фото
  description: Фотография создаёт ложное представление о фактах, условиях или последствиях ситуации, описанной в отзыве.
  example: Фото чужого объекта как якобы доказательство нарушения
  severity: high
- id: RVW-IMG-05
  category: Персональные данные
  title: Фото содержит персональные данные
  description: На фото видны телефон, email, адрес, номер документа, профиль в соцсети, QR-код, билет или иные идентифицирующие
    данные.
  example: Фото билета с номером заказа или скрин чата с контактами
  severity: critical
- id: RVW-IMG-06
  category: Персональные данные
  title: Фото содержит финансовые или заказные данные
  description: На фото видны реквизиты оплаты, сумма возврата, банковские данные, номер заказа, брони или транзакции.
  example: Скрин возврата денег или банковского приложения
  severity: critical
- id: RVW-IMG-07
  category: Персональные данные
  title: Фото содержит переписку или внутренние материалы
  description: Изображение включает личную переписку, обращения в поддержку, данные CRM, внутренние заметки или служебные
    интерфейсы.
  example: Скрин Telegram-переписки или CRM-карточки клиента
  severity: high
- id: RVW-IMG-08
  category: Юридические риски
  title: Фото содержит клеветнические или неподтверждённые обвинения
  description: Изображение используется для распространения неподтверждённых обвинений в адрес людей, компаний или сервиса.
  example: Картинка с надписью «мошенники» без доказательств
  severity: critical
- id: RVW-IMG-09
  category: Нормы общения
  title: Оскорбительные надписи или визуальные унижения
  description: Фото содержит текст, мемы, монтаж или иные визуальные элементы с оскорблениями, унижением или травлей.
  example: Коллаж с оскорбительной подписью в адрес организатора или клиента
  severity: high
- id: RVW-IMG-10
  category: Неприемлемый контент
  title: Насилие, шок-контент или травмирующие сцены
  description: Изображение содержит жестокие, натуралистичные или травмирующие сцены.
  example: Кровь, тяжёлые травмы, сцены насилия
  severity: critical
- id: RVW-IMG-11
  category: Неприемлемый контент
  title: Контент для взрослых
  description: Фото содержит порнографические, сексуально откровенные или непристойные материалы.
  example: Откровенные изображения тела или сексуальные сцены
  severity: critical
- id: RVW-IMG-12
  category: Неприемлемый контент
  title: Пропаганда запрещённых веществ или опасных действий
  description: Изображение продвигает наркотики, саморазрушительное поведение, оружие или иные опасные действия.
  example: Фото употребления наркотиков или демонстрации опасных действий
  severity: critical
- id: RVW-IMG-13
  category: Формат
  title: Скриншот вместо уместной фотографии
  description: Изображение представляет собой случайный скриншот интерфейса, текста или чата без ценности для публикации в
    отзыве.
  example: Скрин заметок телефона без связи с кейсом
  severity: low
- id: RVW-IMG-14
  category: Реклама и спам
  title: Рекламный баннер, водяной знак или промо
  description: |-
    Фото используется как рекламный носитель: содержит рекламные вставки, крупные водяные знаки, призывы к покупке, ссылки или контакты.
  example: Баннер со скидкой и номером WhatsApp
  severity: medium
- id: RVW-IMG-15
  category: Логика платформы
  title: Фото подрывает доверие к сервису или участникам без оснований
  description: Изображение содержит неподтверждённые обвинительные надписи в адрес платформы, модерации, организатора или
    клиента.
  example: Монтаж с подписью «платформа скрывает правду»
  severity: high
