# =========================================================================
# Image rules — scope для AI-разметки (Sprint P6 Этап 0)
# =========================================================================
# Подмножество image_rules.yaml, размечаемое в R&D-бенчмарке. Эвристически
# разрешимые правила (blur, aspect ratio, OCR-площадь, perceptual hash)
# выведены за scope: они детерминированно покрываются стандартными
# инструментами и не интересны для бенчмарка LLM-провайдеров.
#
# Источник правды правил остаётся в image_rules.yaml. Этот файл — только
# фильтр scope для:
#   - prompts/annotate-image-conservative-vN.txt (компилируется с учётом
#     scope через pnpm rules:compact),
#   - cases:audit --rules=image (считает покрытие только по in_scope).
#
# Обоснования каждого правила см. в docs/image-annotation-design.md.
# Любая правка списка — отдельный коммит с пометкой в design-doc.
# =========================================================================

version: 1
last_updated: '2026-05-04'

# 25 правил, размечаемых через локального AI-агента в интерактивной сессии.
in_scope:
  - IMG-03   # Фото не относится к активности
  - IMG-04   # Вводящее в заблуждение фото
  - IMG-05   # Фото другого объекта или бренда
  - IMG-06   # Документы, билеты, номера заказов
  - IMG-07   # Контакты и персональные данные
  - IMG-08   # Дети и чувствительные категории без уместности
  - IMG-09   # Водяные знаки и логотипы сторонних сервисов
  - IMG-10   # Чужой рекламный материал
  - IMG-11   # Контакты для ухода с платформы
  - IMG-12   # Рекламный креатив вместо фото
  - IMG-14   # Коллаж или макет плохого качества
  - IMG-16   # Обнаженность или сексуализированный контент
  - IMG-17   # Шок-контент, кровь, травмы
  - IMG-18   # Опасные действия без контекста безопасности
  - IMG-19   # Запрещенные вещества или их пропаганда
  - IMG-20   # Экстремизм, ненависть, запрещенная символика
  - IMG-21   # Акцентная демонстрация алкоголя
  - IMG-22   # Курение или вейпы в акценте
  - IMG-23   # Избыточная ретушь или генеративная картинка
  - IMG-24   # Чужие отзывы, рейтинги, обещания на изображении
  - IMG-25   # Фото не отражает маршрут/место/программу
  - IMG-27   # Скриншот интерфейса вместо фото
  - IMG-28   # Фото используется не по назначению
  - IMG-29   # Непубличные условия и внутренняя информация
  - IMG-30   # Нарушение прав на использование изображения

# 5 правил, разрешимых детерминированно — вне scope этого R&D.
out_of_scope:
  - id: IMG-01
    reason: Blur (Laplacian variance), яркость, разрешение — детерминированно через sharp/Pillow.
  - id: IMG-02
    reason: EXIF orientation, чёрные поля, обрезка по aspect — детерминированно.
  - id: IMG-13
    reason: Площадь текста на изображении — OCR + покрытие пикселей, детерминированно.
  - id: IMG-15
    reason: Aspect ratio, поля, размер — простые проверки геометрии файла.
  - id: IMG-26
    reason: Дубликаты — perceptual hash (pHash/dHash) с порогом Hamming distance.
