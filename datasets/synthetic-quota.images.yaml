# =========================================================================
# Synthetic quota — IMG-правила (Sprint P6 Этап 4)
# =========================================================================
# На v1 файл намеренно пустой: synthetic-image-генерация — отдельный
# спринт (Sprint P7+). До тех пор `pnpm cases:audit --rules=image` для
# каждого AI-only IMG-правила показывает quota = '—' и delta = '—'
# (пока ни defaults, ни overrides не определены — целевая квота не
# задана и невозможно посчитать delta).
#
# После Sprint P7 этот файл заполняется по образцу
# `datasets/synthetic-quota.yaml`:
#   defaults: { critical: N, high: N, medium: N, low: N }
#   overrides: { IMG-XX: N }
# Override прибит к rule_id, не к severity — позволяет занулить квоту
# по правилу, уже закрытому реальной выборкой.
# =========================================================================
defaults: {}
overrides: {}
