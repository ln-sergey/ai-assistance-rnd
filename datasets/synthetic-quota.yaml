version: 1
# Целевое число hits на rule_id для бенчмарка.
# Используется `pnpm cases:audit` для расчёта delta = max(0, quota - total).
# Total считается как real_hits + synthetic_hits (один источник правды).
#
# Дефолт по severity: применяется к правилам без явного override.
# Override прибит к rule_id, не к severity — позволяет занулить квоту
# по правилу, которое уже закрыто реальной выборкой (или специфично
# не интересно для бенчмарка).
defaults:
  critical: 10
  high: 7
  medium: 5
  low: 3

overrides:
  # TXT-20 уже закрыт scantour'ом (16 hits в real-dirty по состоянию на
  # 2026-04-27 — паттерн «Бронирование на сайте или по телефону…»).
  # Дополнительная синтетика по этому правилу искажает баланс датасета,
  # модератору паттерн ловить тривиально.
  TXT-20: 0
